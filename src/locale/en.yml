guidelines.t7: FAQ
guidelines.faq.section1: About Submitting a Proposal
guidelines.faq.q1: 1. When will you announce the result? Will everyone receive notifications whether the proposal is accepted or denied?
guidelines.faq.a1: We will notify all submitters by email (whether accepted or not) by the end of February, and publish the finalized agenda in late March.
guidelines.faq.q2: 2. Can I revise my proposal after submission?
guidelines.faq.a2: Yes. g0v Summit 2026 accepts submissions via a Google Form. After you submit, you can sign in with the same account to view and revise your entry repeatedly until the form closes on January 15.
guidelines.faq.q3: 3. Can I submit more than one proposal?
guidelines.faq.a3: Sure. g0v Summit 2026 staff will assess all proposals according to the diversity of speakers, the quality of proposals, etc.
guidelines.faq.q4: 4. For some reasons, I don’t want to be filmed, recorded, shoot, broadcasting or leave any forms of records. Is it still suitable for me to submit a proposal?
guidelines.faq.a4: Sure. The submission system will have the option for you to choose if your talk can be recorded in any format.
guidelines.faq.section2: About the Conference
guidelines.faq.q5: 1. My presentation will not be conducted in Mandarin, will Summit offer interpreters?
guidelines.faq.a5: All conference rooms will provide AI real-time captioning (Mandarin to English/English to Mandarin).
guidelines.faq.q6: 2. My proposal needs special assistance (like sign language, accessibility, etc.), will you be able to help?
guidelines.faq.a6: Please leave a note about what you need when submitting a proposal, we will make our best to provide assistance in consideration of the stage and costs.
guidelines.faq.q7: 3. What equipment will be provided?
guidelines.faq.a7: >-
  <p>Each room provides basic conference equipment: projector, microphones, and a livestreaming setup.</p>
  <p>Collaborative notes are open for every session, available to onsite and online participants before, during, and after the event. We use Slido for live Q&A so moderators and speakers can quickly review questions. 110V power outlets are available throughout the venue.</p>
  <p>If you have special requirements, please note them in your proposal.</p>
guidelines.faq.section3: About Travel and Accommodation guidelines
guidelines.faq.q8: 1. I don’t live in Taipei, would you help arrange accommodation and transportation? Would you provide travel subsidy?
guidelines.faq.a8: Sorry, g0v Summit won’t provide any accommodation and transportation assistance.
guidelines.faq.q9: 2. I am a foreigner, would g0v Summit assist me to apply for a visa and entry related documentation?
guidelines.faq.a9: >-
  <p>We will send an invitation letter after notifying selected proposals so that you can use it toward visa application and upon entry to Taiwan.</p>
  <p>For other visa-related questions, please refer to the Ministry of Foreign Affairs and consult our overseas representative offices.</p>
  <p>If you need g0v Summit to provide any other documents, please contact us at <a href="mailto:programming@summit.g0v.tw">programming@summit.g0v.tw</a>.</p>
guidelines.t8: Contact Information

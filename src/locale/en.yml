guidelines.t4: Agenda Formats
guidelines.formats.1.title: Talk
guidelines.formats.1.subtitle: " "
guidelines.formats.1.desc: 20 minutes, 1-2 speaker(s).
guidelines.formats.2.title: Panel Discussion
guidelines.formats.2.subtitle: " "
guidelines.formats.2.desc: >-
  <p>Available durations: 60/90/120 minutes. Assemble your own speaker(s) lineup with no limit on the number of speakers.</p>
  <p>You may designate one person as the moderator. The panel will hold an on-stage conversation around a specific topic.</p>
guidelines.formats.3.title: Workshop
guidelines.formats.3.subtitle: " "
guidelines.formats.3.desc: >-
  <p>Available durations: 60/90/120 minutes. A facilitation team of 1–5 people leads participants through an interactive agenda such as small-group discussions and hands-on activities.</p>
  <p>The session typically runs in breakout groups, each focusing on a subtopic or task, then reconvenes for a whole-group share-out of results and observations.</p>
guidelines.formats.4.title: Roundtable Discussion
guidelines.formats.4.subtitle: " "
guidelines.formats.4.desc: >-
  <p>Available durations: 60/90/120 minutes. Guided by 1–3 facilitators, attendees join an open discussion.</p>
  <p>The session uses a single discussion space: everyone engages the same topic, with one person speaking at a time. Real-time questions and interactions are encouraged. This format emphasizes public reasoning, the cross-pollination of viewpoints, and the fluidity of collective deliberation.</p>

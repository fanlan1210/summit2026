index.t4: What is g0v Summit?
index.p3: >-
  (非正式翻譯版本僅作佔位) g0v is a civic tech community born in Taiwan. By offering more readable
  information and more usable digital services, it advances civic engagement in
  public issues. In g0v’s polycentric universe, projects self-organize and
  contribute autonomously, practicing open collaboration at the grassroots level and
  releasing results under open-source licenses so more people can build on them.
  <br>
  Through hackathons and hands-on projects, and to connect practitioners of civic
  tech, open data, and digital governance in Taiwan and worldwide, the g0v community
  holds “g0v Summit” every two years—bringing civic hackers, NGOs, public servants,
  and advocates together to share stories and experiences.
index.t5: Past events
index.t6: Join g0v
index.p4: >-
  g0v (gov-zero) is a grassroots social movement community dedicated to deepening the civic engagements and connections between the social arena and citizens. You can find like-minded partners in the g0v community, put your ideas into practice in a grassroots manner, and then release the results under an open-source license, letting people stand on your shoulders.
  <br>
  g0v replaces the “o” in gov with “0”, thereby reimagining the role of government from scratch, and represents the vision from 0 to 1 of the generation of digital natives.

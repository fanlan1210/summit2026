guidelines.t5: Selection Criteria
guidelines.p5: >-
  <p>g0v Summit 2026 prioritizes proposals that demonstrate <strong>project results, impact, or knowledge sharing</strong>. We evaluate based on:</p>
  <ul>
  <li><strong>Topicality/Urgency</strong></li>
  <li><strong>Openness &amp; Public Benefit</strong></li>
  <li><strong>Community Relevance</strong></li>
  <li><strong>Actionability (Tools/Methods)</strong></li>
  <li><strong>Accessibility to the general public</strong></li>
  </ul>
  <p>We pay special attention to local characteristics of <strong>Taiwan, Southeast Asia, and East Asia</strong>, and strive for balance in <strong>gender and geography</strong>.</p>
  <p><strong>Review Process:</strong> Proposals pass a format check by the agenda team, then are reviewed by g0v Summit 2026 staff based on:</p>
  <ol>
  <li><strong>Content:</strong> Uniqueness of the issue, experience, or perspective.</li>
  <li><strong>Expression:</strong> Is the information complete, logical, and clear? (Detailed info helps us understand your talk better).</li>
  <li><strong>Audience Fit:</strong> Is it suitable for the g0v Summit audience? (Popular topics may be assigned to larger halls).</li>
  </ol>

index.hero.title: Summit 2026
index.hero.date: 2026.5
index.hero.location: Taipei, Taiwan
index.t1: Summit <br class="md:hidden">2026 “Invite Yourself”
index.p1: >-
  (非正式，僅作佔位) g0v Summit 2026 focuses on civic tech and public-private collaboration. This year,
  after community discussions, we set the theme as “Invite Yourself,” reflecting on
  fragmented public spaces and fading momentum. We hope to broaden participation and
  actively connect civic groups across Taiwan, rekindling constructive contributions
  through diverse session formats in the spirit of open collaboration. 
  <br>
  We look forward to presenting civic tech and advocacy practices, showing the
  potential of civic action across fields. Whether sharing inspiring wins or lessons
  from failures, we invite civic hackers and on-the-ground advocates to gather,
  understand each other, and encourage newcomers to take ownership—turning the
  Summit into a place that stitches together actors in civil society.

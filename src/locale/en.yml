index.t4: What is g0v Summit?
index.p3: >-
  <p>Since 2012, under the call to “fork the government and code for society,” the <a href="https://g0v.tw" target="_blank">g0v.tw</a> (read as gov-zero) community has practiced over a decade of civic hacking. Centered on <strong>“Information Transparency, Open Results, and Open Collaboration,”</strong> we use the power of the grassroots to care for public affairs.</p>
  <p>Following the <strong>Sunflower Movement</strong>, we launched the g0v Summit in 2014, building a bridge for interdisciplinary dialogue between open communities, government, NGOs, academia, and netizens.<br>Over these dozen years, Taiwanese society has weathered democratic crises, social turbulence, polarization, and “snake bites” of frustration.</p>
  <p>Facing the scars of Taiwanese society and threats from near and far, “Ten Years” is not just a measure of time. It marks the continuous action and practice of the civic community: a process of transforming fear into resilience.</p>
  <p>There is a saying: <em>“Once bitten by a snake, ten years afraid of a straw rope.”</em></p>
  <p>But at g0v Summit 2026, we say: <strong>“Ten Years of <em>Phah</em> the Rope.”</strong><br>We believe in the power of the grassroots and our connection to one another. We can continuously transform that fear (<strong>Phah</strong>, to be afraid) into action (<strong>Phah</strong>, to beat/weave in Tâi-gí).</p>
  <p><strong>To <em>Phah-kat</em> (tie a knot in Tâi-gí) is not just about holding tight; it is about learning how to loosen.</strong> About loosening our passive posture, loosening dependency and fear. In an era of crisis and uncertainty, we are retraining our muscles for “Self Help” and “Mutual Aid.”</p>
  <p>We refuse to recoil in passive fear of the rope. Instead, g0v Summit 2026 invites everyone here to roll up their sleeves, grab that straw rope, and start rubbing and beating it anew. As we branch out, weave, and connect, the “Snake” is no longer a phantom of terror, but a strong, organic community.</p>
index.t5: Past events
index.t6: Join g0v
index.p4: >-
  <p>g0v (gov-zero) is a grassroots social movement community dedicated to deepening the civic engagements and connections between the social arena and citizens. You can find like-minded partners in the g0v community, put your ideas into practice in a grassroots manner, and then release the results under an open-source license, letting people stand on your shoulders.</p>
  <p>g0v replaces the “o” in gov with “0”, thereby reimagining the role of government from scratch, and represents the vision from 0 to 1 of the generation of digital natives.</p>

guidelines.t1: How to Submit
guidelines.p1: >-
  (非正式，僅作佔位) g0v Summit 2026 accepts proposals via the official Google Form only.
  Submissions close at 23:59 (UTC+8) on Jan 15, 2026. You may edit your
  submission in the form until the deadline. After review, accepted proposals
  will be confirmed with submitters. Once confirmed, privacy-related info (except
  nickname) will be removed, and the agenda will start to be published in late March.
guidelines.t2: (非正式，僅作佔位) CFP theme — mapping civic coordinates from nodes to networks
guidelines.p2: >-
  (非正式，僅作佔位) Someone told us, “Once bitten by a snake, you’ll fear the rope for ten years.”
  Taiwan’s civil society is facing challenges and shocks, yet we refuse to stay
  fearful. We pick up the “rope” and turn fear into action—phah—crafting a
  resilient 3D coordinate system of values, actions, and spaces.
  <br>
  In this coming summit, every participant is a “point” in this 3D space—this is
  phah-kat. No one is an outsider; everyone can locate themselves by values,
  actions, and space:
guidelines.axes.x: "X axis (values): radical transparency/open vs. autonomy/privacy"
guidelines.axes.y: "Y axis (actions): growing upward vs. rooting downward"
guidelines.axes.z: "Z axis (space): in-system government vs. grassroots civic sphere"
guidelines.p3: >-
  When we cast out the rope and talk with others, points connect into lines—even
  opposing lines can be woven together. Countless lines then form a mesh. On this
  community-woven web, isolated nodes become clusters; single-thread dialogues
  evolve into collaborative ecosystems. It is both a safety net and a launchpad
  for civic creativity—a plural, open space where everyone can find their place.

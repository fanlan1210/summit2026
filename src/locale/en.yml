guidelines.t4: (非正式，僅作佔位) Session formats
guidelines.formats.1.title: Talk
guidelines.formats.1.subtitle: " "
guidelines.formats.1.desc: 220 minutes, 1-2 speaker(s).
guidelines.formats.2.title: Panel Discussion
guidelines.formats.2.subtitle: " "
guidelines.formats.2.desc: 60/90/120 minutes. Assemble your own panel; any number of speakers, one may be the moderator, discussing a focused topic.
guidelines.formats.3.title: Workshop
guidelines.formats.3.subtitle: " "
guidelines.formats.3.desc: 60/90/120 minutes. 1–5 hosts lead interactive small-group activities or hands-on sessions; often split into groups then share back.
guidelines.formats.4.title: Roundtable Discussion
guidelines.formats.4.subtitle: " "
guidelines.formats.4.desc: 60/90/120 minutes. 1–3 hosts guide an open floor discussion with on-site participants; single discussion space, encourage live Q&A, dialogue, and collective reflection.
guidelines.t5: (非正式，僅作佔位) Selection Criteria
guidelines.p5: g0v Summit 2026 prioritizes proposals with concrete results, impact, and knowledge sharing, with attention to local contexts in Taiwan/SEA/East Asia and balance across gender and regions.
guidelines.t6: Privacy Policy
guidelines.p6: Personal Data Collection Agreement
guidelines.p7: "In respect to the “Personal Information Protection Act”, notify you of your responsibilities and rights by the following:"
guidelines.p8: "1. Institution: g0v Summit 2026 Working Group."
guidelines.p9: "2. Purpose: g0v Summit event usage."
guidelines.p10: "3. Collected data: Personal data on Application form."
guidelines.p11: "4. Personal data usage detail:"
guidelines.p12: "a. duration: g0v Summit 2026 preparation and 30 days after event days."
guidelines.p13: "b. Area: Taiwan (R.O.C)"
guidelines.p14: "c. Data usage subject: g0v Summit 2026 website and its proposal."
guidelines.p15: "d. methods: Collecting, Editing, Using."
guidelines.p16: "5. In terms of the 3rd paragraph of the Act, you may request the following rights:"
guidelines.p17: a. Inquire or request to view.
guidelines.p18: b. Request for a hard copy.
guidelines.p19: c. Request for annotation or correction.
guidelines.p20: d. Request for stop collecting, edit, using.
guidelines.p21: e. Request for deletion.
guidelines.p22: 6. In terms of the 14th paragraph of the Act, you can Inquire or request for viewing your personal data or request for a hard copy.
guidelines.p23: 7. If the purpose of 5th, 6th right, please email programming@summit.g0v.tw.
guidelines.t7: FAQ
guidelines.faq.section1: About Submitting a Proposal
guidelines.faq.q1: 1. When will you announce the result? Will everyone receive notifications whether the proposal is accpected or denied?
guidelines.faq.a1: (非正式，僅作佔位) We will email both accepted and declined submitters by end of February, and publish the confirmed agenda in late March.
guidelines.faq.q2: 2. Can I revise my proposal after submission?
guidelines.faq.a2: (非正式，僅作佔位) Yes. Until the Jan 31 form deadline, you can revisit with the same account and edit your submission.
guidelines.faq.q3: 3. Can I submit more than one proposals?
guidelines.faq.a3: Sure. The Programming Committee will assess all proposals according to the diversity of speakers, the quality of proposals, etc.
guidelines.faq.q4: 4. For some reasons, I don’t want to be filmed, recorded, shoot, broadcasting or leave any forms of records. Is it still suitable for me to submit a proposal?
guidelines.faq.a4: Sure. The submission system will have the option for you to choose if your talk can be recorded in any format.
guidelines.faq.section2: About the Conference
guidelines.faq.q5: 1. My presentation will not be conducted in Mandarin, will Summit offer intepreters?
guidelines.faq.a5: (非正式，僅作佔位) All rooms provide AI live transcription (Mandarin→English, English→Mandarin).
guidelines.faq.q6: 2. My proposal needs special assistance (like sign language, accessiblility, etc.), will you be able to help?
guidelines.faq.a6: Please leave a note about what you need when submitting a proposal, we will make our best to provide assistance in consideration of the stage and costs.
guidelines.faq.q7: 3. What equipments will be provided?
guidelines.faq.a7: (非正式，僅作佔位) Basic AV (projector, mics, streaming), shared notes, <a href=\"https://www.slido.com/\" target=\"_blank\">sli.do</a> for Q&A, and 110V power outlets throughout. You can note your special needs in your proposal submission.
guidelines.faq.section3: About Travel and Accommodation guidelines
guidelines.faq.q8: 1. I don’t live in Taipei, would you help arrange accommodation and transportation? Would you provide travel subsidy?
guidelines.faq.a8: Sorry, g0v Summit won’t provide any accommodation and transportation assistance.
guidelines.faq.q9: 2. I am a foreigner, would g0v Summit assist me to apply visa and entry related documentation?
guidelines.faq.a9: >-
  We will send an invitation letter after notifying selected propsals so that you can use it toward visa application and upon the entry of Taiwan.
  <br>
  For other visa-related questions, please refer to the Ministry of Foreign Affairs and consult our overseas representative offices.
  <br>
  If you need g0v Summit to provide any other documents, please contact us programming@summit.g0v.tw.

guidelines.t1: How to Submit
guidelines.p1: >-
  <p>g0v Summit 2026 will run an open, online call for proposals. Submissions are accepted only via the designated Google Form.</p>
  <p>The call for proposals closes on January 15, 2026 at 23:59 (UTC+8). You may revise your submission in the Google Form at any time before the deadline.</p>
  <p>After the deadline, the Programming Committee will select the program and confirm details with each submitter. Once your proposal is accepted, we will remove privacy‑sensitive information and personal data (except your nickname) prior to publication. Accepted sessions are expected to be published progressively on the g0v Summit 2026 website starting in late March.</p>
guidelines.t2: "Call for Proposals: Civic Coordinate from Node to Surface"
guidelines.p2: >-
  <p>In Taiwanese (Tâi-gí), <strong>“Phah”</strong> doesn’t just mean to build—it also means <strong>“The Beat.”</strong></p>
  <p>At g0v Summit 2026, we invite you to step into a three dimension <strong>“Civic Ballroom”</strong> woven from our three major axes: <strong>(Openness & Transparency, Autonomy & Privacy)</strong>, <strong>(Overseeing the Power, Resilient Connection)</strong>, and <strong>(Government Structure, Grassroots/Civil Society)</strong>.</p>
  <p><strong>Find your coordinates:</strong></p>
guidelines.axes.x: "Do you pursue public <strong>Transparency & Openness</strong>, or personal <strong>Autonomy & Privacy</strong>?"
guidelines.axes.y: "Is your strength in “Upward” <strong>Overseeing the Power</strong>, or “Downward” <strong>Resilience & Healing</strong>?"
guidelines.axes.z: "Do you operate within <strong>Government & Organizations</strong>, or in decentralized <strong>Grassroots/Civil Society</strong>?"
guidelines.p3: >-
  <p>Wherever your coordinates lie, we welcome your proposal.<br>When the music starts—<strong>“Floor it!” (<em>Cui-loh-khi</em>)</strong></p>
  <p>Don’t just stand there. Follow the beat, find your footing.<br>Bring your knots, pull your thread.<br>On this dance floor, let’s see your own unique <strong>“Dance Steps”</strong>!</p>
  <p><strong>Welcome to the grand <em>Party</em>!</strong></p>

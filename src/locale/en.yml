index.t1: Invite Yourself into a Braided Nexus
index.p1: >-
  <p>It’s often said that <em>once bitten, twice shy</em>. In times where democracy backsliding and social polarization are tearing the very fabric of civic space apart, activists may as well feel bitten by the venomous state of public dialogue.</p>
  <p>Yet if we are tired of infuriating quarrels and political apathy, we shall move out from the comfort of armchairs and to braid back the society we desire ourselves. The decade-old g0v motto, hacktivism at its core, perfectly manifested the idea: <em>“Ask not why nobody is doing this. You're that nobody—and ‘nobody’ can do everything.“</em></p>
  <p>At g0v Summit 2026, we kindly ask you to <strong>“invite yourself”</strong> to take charge on braiding our future. Step into a three-dimensional civic space woven from different fabrics of the civic society—</p>
  <p>Every participant, including you, represents a <strong>point</strong> in the coordinate system, defined by your unique skills, values, and stance. As we communicate with each other, points connect into <strong>lines</strong>. As countless lines intertwine, woven <strong>surfaces</strong> supported by dynamic network of action take shape, doubling as hammocks that gently catch us. Thus, isolated nodes form clusters and single-threaded conversations evolve into collaborative ecosystems.</p>
  <p>Derived from g0v’s core values: transparency, openness, and collaboration, we are braiding the Civic Coordinate System of g0v Summit 2026 with three major axes: <strong>(transparency–autonomy/privacy)</strong>, <strong>(advocacy–recovery)</strong>, <strong>(government agency–grassroots/civil society)</strong>.</p>
  <p>There are no outsiders here. Everyone can find their own coordinates to explore inward and connect outward.</p>
